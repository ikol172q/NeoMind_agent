  max_loss: 100% of contributed capital (theoretical); historically max drawdown ~55%
    (2007-09)
  pdt_relevant: false
  tax_treatment:
    qualifies_long_term: true
    wash_sale_risk: low
    section_1256: false
    notes: Hold >12 months for LTCG. Reinvested dividends create new lots — track
      basis.
