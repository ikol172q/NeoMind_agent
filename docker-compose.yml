# ─────────────────────────────────────────────────────────
# NeoMind Agent + OpenClaw Integration
#
# Deployment scenarios:
#
# 1. NeoMind interactive CLI:
#      docker compose up neomind
#
# 2. NeoMind as Telegram bot (daemon):
#      docker compose up neomind-telegram
#
# 3. Full stack (NeoMind Telegram + OpenClaw):
#      docker compose --profile full up
#
# 4. Both CLI + Telegram bot:
#      docker compose up neomind neomind-telegram
#
# Required: Copy .env.example to .env and fill in API keys
# ─────────────────────────────────────────────────────────

services:

  # ── NeoMind Finance Agent ──────────────────────────────
  neomind:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neomind-agent
    env_file: .env
    environment:
      - TERM=xterm-256color
      - HOME=/data
      # OpenClaw gateway auto-detection:
      # If OpenClaw is in the same compose, this resolves via Docker DNS.
      # If OpenClaw is external, set OPENCLAW_GATEWAY_URL in .env.
      - OPENCLAW_GATEWAY_URL=${OPENCLAW_GATEWAY_URL:-ws://openclaw-gateway:18789}
    volumes:
      # Persistent data (memory, conversations, predictions)
      - neomind-data:/data/neomind
      # Shared config dir (provider-state.json — bidirectional sync with xbar)
      - ${NEOMIND_STATE_DIR:-~/.neomind}:/data/.neomind
      # Share OpenClaw memory for bidirectional bridge
      - ${OPENCLAW_CONFIG_DIR:-openclaw-config}:/data/openclaw:ro
      # Obsidian vault — NeoMind writes, Obsidian on Mac reads
      - ${NEOMIND_VAULT_DIR:-~/neomind-vault}:/data/vault
    ports:
      # Standalone sync port (only used if OpenClaw not available)
      - "${NEOMIND_SYNC_PORT:-18790}:18790"
    stdin_open: true     # -i : needed for interactive CLI
    tty: true            # -t : needed for terminal colors
    restart: unless-stopped
    networks:
      - neomind-net
    # Connect to OpenClaw's network if it exists
    # (see instructions below for external network setup)

  # ── NeoMind Telegram Bot (daemon mode) ─────────────────
  # Runs with supervisord managing: agent + health-monitor + watchdog
  neomind-telegram:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neomind-telegram
    env_file: .env
    environment:
      - TERM=xterm-256color
      - HOME=/data
      - OPENCLAW_GATEWAY_URL=${OPENCLAW_GATEWAY_URL:-ws://openclaw-gateway:18789}
      # ── LLM API keys: inherit from shell env (zshrc) — never written to .env ──
      # docker compose reads these from the shell invoking it; if a key is unset
      # in the shell env, it stays empty in the container (no override).
      - DEEPSEEK_API_KEY
      - ZAI_API_KEY
      - GLM_API_KEY
      - MOONSHOT_API_KEY
    volumes:
      - neomind-data:/data/neomind
      # Shared config dir (provider-state.json — bidirectional sync with xbar)
      - ${NEOMIND_STATE_DIR:-~/.neomind}:/data/.neomind
      - ${OPENCLAW_CONFIG_DIR:-openclaw-config}:/data/openclaw:ro
      # Obsidian vault — NeoMind writes, Obsidian on Mac reads
      - ${NEOMIND_VAULT_DIR:-~/neomind-vault}:/data/vault
      # ── Live source code mount (enables self-edit + git without rebuild) ──
      # Mount entire project root → NeoMind edits persist on host, can git commit.
      # Image COPY is fallback if mount removed.
      - .:/app
      # Prevent container node_modules / venv from leaking to host (and vice versa)
      - /app/__pycache__
      - /app/.venv
    # Health port (18791) is NOT mapped to host — Docker HEALTHCHECK runs
    # inside the container, and xbar checks status via `docker ps`.
    # If you need external access: uncomment the ports section below.
    # ports:
    #   - "${NEOMIND_HEALTH_PORT:-18791}:18791"
    expose:
      - "18791"
    restart: unless-stopped
    networks:
      - neomind-net
    # Override entrypoint to run as Telegram bot daemon
    command: ["telegram"]
    # Docker-level health check (queries internal health monitor)
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:18791/health', timeout=5)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 45s
    # Memory limit to prevent OOM taking down the host
    deploy:
      resources:
        limits:
          memory: 2G

  # ── NeoMind Telegram CANARY (zero-downtime self-evolution) ─────
  # Started only via the "canary" profile:
  #   docker compose --profile canary up -d neomind-canary
  #
  # Purpose: EvolutionTransaction deploys proposed changes to this
  # container FIRST, runs the Telethon validator against the canary
  # bot token, and only after PASS triggers the production restart.
  # Production stays up throughout.
  #
  # Prerequisites (one-time user setup):
  #   1. Create a second bot via @BotFather → e.g. @your_canary_bot_example
  #   2. Add to .env:
  #        TELEGRAM_TEST_BOT_TOKEN=<new bot token from BotFather>
  #        TG_CANARY_BOT_USERNAME=@your_canary_bot_example
  #   3. docker compose --profile canary up -d neomind-canary
  #
  # See docs/CANARY_BOT_SETUP.md for the full walkthrough.
  neomind-canary:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neomind-canary
    profiles: ["canary", "full"]
    env_file: .env
    environment:
      - TERM=xterm-256color
      - HOME=/data
      - OPENCLAW_GATEWAY_URL=${OPENCLAW_GATEWAY_URL:-ws://openclaw-gateway:18789}
      # Canary swaps the Telegram token for the test bot so polling
      # and sendMessage hit a disjoint bot. Keeps canary traffic
      # invisible to real users.
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_TEST_BOT_TOKEN:-}
      # Marker so application code can choose a different state file
      # and avoid polluting production chat_history / provider state.
      - NEOMIND_CANARY=1
    volumes:
      # Isolated state directory — no shared mount with production.
      - neomind-canary-data:/data/neomind
      - ${NEOMIND_STATE_DIR:-~/.neomind}:/data/.neomind
      - ${OPENCLAW_CONFIG_DIR:-openclaw-config}:/data/openclaw:ro
      # Live-mount the same source tree as production so the canary
      # picks up code changes as soon as a self-edit commits.
      - .:/app
      - /app/__pycache__
      - /app/.venv
    expose:
      - "18791"
    # Canary should NOT auto-restart — the EvolutionTransaction
    # orchestrator explicitly manages its lifecycle so a crash
    # surfaces as a canary FAIL instead of silent recovery.
    restart: "no"
    networks:
      - neomind-net
    command: ["telegram"]
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:18791/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 2
      start_period: 30s
    # Half the production memory budget — canary only serves the
    # Telethon validator, not real users.
    deploy:
      resources:
        limits:
          memory: 1G

  # ── OpenClaw (optional — only with --profile full) ─────
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: openclaw-gateway
    profiles: ["full"]
    env_file: .env
    environment:
      - HOME=/home/node
      - TERM=xterm-256color
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-openclaw-config}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-openclaw-workspace}:/home/node/.openclaw/workspace
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
    restart: unless-stopped
    networks:
      - neomind-net

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: openclaw-cli
    profiles: ["full"]
    env_file: .env
    environment:
      - HOME=/home/node
      - TERM=xterm-256color
      - BROWSER=echo
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-openclaw-config}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-openclaw-workspace}:/home/node/.openclaw/workspace
    network_mode: "service:openclaw-gateway"
    depends_on:
      - openclaw-gateway
    stdin_open: true
    tty: true
    command: ["openclaw"]

  # ── SearXNG Meta-Search Engine (optional — free, self-hosted, unlimited) ──
  # Aggregates Google, Bing, DDG, and 70+ other engines.
  # No API keys, no rate limits, no tracking.
  #
  # Start:  docker compose up searxng
  # Use:    Set SEARXNG_URL=http://searxng:8080 in .env
  #         NeoMind auto-detects and adds it as Tier 3 search source.
  searxng:
    image: searxng/searxng:latest
    container_name: neomind-searxng
    profiles: ["search", "full"]
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080
    volumes:
      - searxng-data:/etc/searxng
    ports:
      - "${SEARXNG_PORT:-8888}:8080"
    restart: unless-stopped
    networks:
      - neomind-net
    # First-run auto-config: enable JSON output format
    entrypoint: >
      sh -c '
        # Ensure settings.yaml enables json format
        if [ ! -f /etc/searxng/settings.yml ]; then
          cp /usr/local/searxng/searx/settings.yml /etc/searxng/settings.yml 2>/dev/null || true
        fi
        # Enable json format in search settings
        if [ -f /etc/searxng/settings.yml ]; then
          sed -i "s/- html/- html\n    - json/" /etc/searxng/settings.yml 2>/dev/null || true
        fi
        exec /sbin/tini -- /usr/local/searxng/dockerfiles/docker-entrypoint.sh
      '

networks:
  neomind-net:
    driver: bridge

volumes:
  neomind-data:
  neomind-canary-data:
  openclaw-config:
  openclaw-workspace:
  searxng-data:
