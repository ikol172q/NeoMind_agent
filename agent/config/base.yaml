# base.yaml — Shared settings for all modes
# ─────────────────────────────────────────────────────────
# NeoMind: 数据驱动的个人能力延伸系统
# Data-Driven Personal Capability Extension System
# ─────────────────────────────────────────────────────────

# === Core Identity ===
identity:
  name: NeoMind
  name_zh: 新思
  tagline: "数据驱动的个人能力延伸系统"
  tagline_en: "Data-Driven Personal Capability Extension System"
  version: "0.3.0"
  # NeoMind is NOT a chatbot, copilot, or trading bot.
  # It is the user's cognitive extension — collecting data,
  # analyzing patterns, remembering lessons, and evolving
  # continuously to amplify the user's personal capabilities.
  philosophy: |
    NeoMind exists to extend the owner's cognitive capabilities.
    Financial independence is the first milestone.
    Every feature, every evolution, every data point serves
    the goal of making the user more capable, more informed,
    and more independent.

# === Self-Evolution Mandate ===
# NeoMind MUST continuously improve itself. This is not optional.
evolution:
  enabled: true
  # NeoMind can modify its own: code, configs, databases, prompts, skills
  self_modify:
    code: true          # via self_edit.py (Git-Gated)
    configs: true       # via prompt_tuner.py + scheduler
    databases: true     # schema migrations via self_edit
    prompts: true       # via prompt_tuner.py
    skills: true        # via skill_forge.py
  # Safety constraints for self-modification
  safety:
    require_tests: true           # Must pass tests before applying code changes
    require_git_commit: true      # Every change tracked in git
    max_edits_per_day: 10
    forbidden_self_edit_files:
      - ".env"
      - "Dockerfile"
      - "agent/evolution/self_edit.py"
      - "agent/evolution/health_monitor.py"
      - "agent/evolution/watchdog.py"
  # Evolution plan location (NeoMind reads this to understand its roadmap)
  plan_path: "/app/plans/2026-03-28_enhanced-evolution-plan.md"
  # Self-check interval: NeoMind re-reads its plan monthly
  plan_review_interval_days: 30

# === Language & Internationalization ===
# NeoMind communicates with the owner in Chinese (preferred),
# but ALL internal processing (search, analysis, evolution, data)
# is language-agnostic.
language:
  # User-facing communication preference
  user_communication: "zh"         # 中文 preferred for talking to user
  # Internal processing languages (search, analysis, data collection)
  processing_languages:
    - "en"                          # English — primary for financial data, code, papers
    - "zh"                          # Chinese — for A-share, Chinese news, user context
  # Future expansion (add as needed, NeoMind can self-modify this list)
  # - "ja"  # Japanese market data
  # - "ko"  # Korean market data
  # - "de"  # European market data
  # Search: query in all processing languages for broader coverage
  multilingual_search: true
  # When data conflicts between languages, note both versions
  cross_language_conflict_resolution: "present_both"

# === API & File Limits ===
# Safety limits for file operations and API interactions
limits:
  # Maximum image file size for processing (bytes)
  image_max_size_bytes: 5242880        # 5MB
  # Maximum PDF pages per read
  pdf_max_pages: 100
  # Maximum PDF file size (bytes)
  pdf_max_size_bytes: 20971520         # 20MB
  # Maximum media attachments per request
  max_media_per_request: 100
  # Default max output tokens
  default_max_tokens: 32000
  # Context compaction threshold (fraction of context window)
  compact_threshold: 0.90
  # Maximum file size for read/write operations (bytes)
  max_file_size_bytes: 10485760        # 10MB
  # Maximum lines per file read
  max_lines_per_read: 5000
  # Maximum output characters per tool result
  max_tool_output_chars: 30000

# === Cost & Token Tracking ===
# NeoMind currently uses cloud LLM APIs (not local models).
# Every API call costs money. Every token matters.
cost:
  # Track all API spending
  tracking_enabled: true
  # Daily budget for evolution tasks (not counting user conversations)
  daily_evolution_budget_usd: 0.06
  # Alert when daily spend exceeds this
  daily_alert_threshold_usd: 0.10
  # Monthly budget cap (soft limit — warns, doesn't block)
  monthly_budget_cap_usd: 5.00
  # Token optimization strategies (always active)
  optimization:
    # Summarize tool outputs before re-injecting into context
    summarize_tool_outputs: true
    # Only inject relevant learnings (not all)
    selective_learning_injection: true
    max_learnings_per_prompt: 5
    # Only send relevant tool schemas (not all 20+)
    selective_tool_schemas: true
    max_tools_per_request: 8
    # Cache identical/similar requests
    response_cache_enabled: true
    cache_similarity_threshold: 0.85
    # Route to cheapest capable model
    smart_routing_enabled: true
  # Model pricing reference (updated manually or via cost_optimizer)
  # Prices are per 1M tokens (input/output)
  model_pricing:
    deepseek-v4-flash: { input: 0.14, output: 0.28 }
    deepseek-v4-pro: { input: 1.74, output: 3.48 }
    kimi-k2.5: { input: 0.50, output: 2.00 }
    # Add more as needed — NeoMind can self-update this section

# === LLM-Agnostic Design ===
# NeoMind works with ANY LLM. The abstraction layer ensures:
# 1. Prompts are model-agnostic (no model-specific formatting)
# 2. Tools/functions use a unified schema (OpenAI-compatible)
# 3. Context management adapts to each model's token limit
# 4. Cost optimization routes to the best model per task
llm:
  # Unified tool/function calling format (OpenAI-compatible)
  tool_format: "openai"  # all providers must translate to this
  # Context budget: never send more than this % of max_context
  context_budget_ratio: 0.75
  # Redundancy reduction: summarize tool outputs before re-injection
  summarize_tool_outputs: true
  # Skill/MCP integration: prefer structured tool calls over raw text
  prefer_structured_calls: true

# === Host Hardware Awareness ===
# NeoMind must not overload the host machine.
# These values should be updated when hardware changes.
host:
  # Current: Mac Studio (update when switching machines)
  machine: "Mac Studio"
  # Docker resource limits (from docker-compose.yml)
  docker_memory_limit_gb: 2
  # Reserved for host OS and other apps
  host_reserved_memory_gb: 8
  # NeoMind's internal memory budget (across all processes)
  internal_memory_budget_mb: 1800
  # Process memory allocation:
  #   agent: ~600MB (with libraries)
  #   health-monitor: ~50MB
  #   watchdog: ~30MB
  #   data-collector: ~150MB (new)
  #   headroom: ~970MB (for spikes, pandas, etc.)

# === Legal Compliance ===
compliance:
  # ALL data collection must be legal and ethical
  data_collection:
    # Only use official APIs with valid API keys
    official_apis_only: true
    # Respect rate limits (never exceed)
    respect_rate_limits: true
    # Follow robots.txt (best practice, not legally required but reduces risk)
    follow_robots_txt: true
    # Personal use only — do not redistribute raw data
    personal_use_only: true
    # Required attribution for data sources
    attribution_required:
      - "CoinGecko"  # Must show "Powered by CoinGecko API"
    # Forbidden actions
    forbidden:
      - "Circumvent authentication or access controls"
      - "Create fake accounts to bypass rate limits"
      - "Scrape data from websites without API access"
      - "Redistribute raw data commercially"
      - "Claim to be a registered financial advisor"
      - "Provide investment advice to third parties for compensation"
  # Data protection (public repo safety)
  data_protection:
    # Git pre-commit hook blocks: .env, .db, .key, .pem, real API keys
    pre_commit_hook: true
    # gitleaks config at repo root for CI/manual scanning
    gitleaks_config: ".gitleaks.toml"
    # Never write these to files that could be committed
    never_persist_to_git:
      - "api_keys"
      - "personal_emails"
      - "financial_predictions_with_real_amounts"
      - "user_credentials"
      - "session_tokens"
    # SQLite databases live in Docker volume only, never in repo
    db_location: "/data/neomind/db/"
    # Retention policy for data cleanup
    retention:
      market_data_days: 90
      news_data_days: 30
      backup_keep_days: 7
      vacuum_schedule: "weekly"
  # Investment analysis disclaimer (injected in fin mode responses)
  disclaimer: |
    NeoMind is a personal analysis tool, not a licensed financial advisor.
    All outputs are for informational purposes only.
    Past performance does not guarantee future results.
    Always do your own due diligence before making investment decisions.

# === Agent Settings ===
agent:
  model: deepseek-v4-flash
  temperature: 0.7
  max_tokens: 8192
  stream: true
  timeout: 90
  max_retries: 3
  thinking_enabled: true
  debug: false
  context:
    # max_context_tokens auto-derived from MODEL_SPECS at runtime.
    # Set to a number to cap below the model's natural max (cost
    # discipline). v4-flash / v4-pro both report 1,000,000 (1M).
    warning_threshold: 0.61
    break_threshold: 0.8
    compression_strategy: truncate
    keep_system_messages: true
    keep_recent_messages: 5
  # Gate-controlled features — maps to FeatureGateRegistry.is_enabled(name)
  # Resolution: env → runtime → config file → YAML (here) → default
  features:
    COORDINATOR_MODE: true
    EVOLUTION: true
    SCRATCHPAD: true
    SESSION_CHECKPOINT: true
    DEFERRED_TOOL_LOADING: true
    DENIAL_TRACKING: true
    BUILTIN_AGENTS: true

# ─────────────────────────────────────────────────────────
# Pyramid Prompt Architecture — LAYER 0 + 1 (shared across personalities)
# ─────────────────────────────────────────────────────────
# Full design source: plans/references/pyramid-prompt-architecture.md
# Inject mechanism: agent_config._rebuild_active_config prepends this
# block to the active personality's system_prompt when the active mode
# is in shared_axioms_inject_modes.
#
# Whitelist (start with fin only; chat/coding will join in a follow-up
# iteration once their personality prompts are pruned of duplicate
# LAYER 0/1 sections):
shared_axioms_inject_modes:
  - fin

shared_axioms_prompt: |
  ══════ NEOMIND 思维三才 (LAYER 0 — 共享根基) ══════

  Three irreducible axioms (道家三才). 不可再 reduce: 互相不能 derive,
  但**互含种子** (你中有我); 情境 dominance 流转 (月有阴晴圆缺) 但
  三者全程 active. Axiom 不是规则, 是**视角的 axes** — 任何 problem
  落在 3D 空间某 region.

  ── 天 / EPISTEMIC HONESTY (认识论诚实) ─────────────────

  你说的每一句必须自带 epistemic frame. 这不是消极"避免错答", 是积极
  声明 confidence + source. 任何未验证的都是推论 (inference).

  5 标签 (你的每个 claim 必标其中之一):
    ✓ verified-by-tool: 本轮 tool 调用刚拿的
        e.g. "AAPL $280.14 [via finance_get_stock 5s ago]"
    ✓ inferred: 从给定信息推出来 (标 source + 推理链)
        e.g. "你 portfolio 偏 tech (推论: 从你买 NVDA 倒推, 没看 portfolio data)"
    ✓ from-training-cutoff: 训练数据 (可能 stale)
        e.g. "DeepSeek v4 1M context [training data 可能 stale]"
    ✓ guess: 没把握, 建议 confirm
        e.g. "我猜你想问的是 X (没把握, 想 confirm)"
    ✓ unknown: 我不知道

  ✗ 不允许 unmarked 平铺直叙 — 所有 claim 必须能溯源
  ✗ 不允许 fake commitment ("下次我会..."): 跨 turn 没承诺记忆 = 无法兑现 = 错答
  ✗ 不允许 capability inflation (说没注册的 tool / channel 限制说成自己借口)

  ── 地 / FIRST-PRINCIPLES (第一性原理) ──────────────────

  涉及 fact / state / data 的判断 — 三向 substrate expansion 同根:

    向内拆 (inward): 拆到 atom — 工具 / 文件 / 数据库 / API
                      "看起来像 X" = warning 信号, 不靠 analogy
    向外说 (upward): silent fork (同输入多种合理读法) → 先 surface
                      assumption 再 act, 别沉默选一种 (Karpathy)
    向旁找 (lateral): user 给 1 frame → 主动 surface ≥ 1 sibling
                      frame ("你为什么是 NVDA 不是 AMD?" /
                      "你真正焦虑的是什么?" / "1 年后哪种结果你最 regret?")

  三向同根: 都是反 analogy 操作的 inward / upward / lateral 三个 axis.
  不让 implicit 锁死答案.

  When NOT to: routine 操作 (git status / 已知 fact 的报价) — pattern-
  match 是对的, 别 over-apply 框架.

  ── 人 / MAIN-CONTRADICTION (主要矛盾) ──────────────────

  多个力 / 多个问题并存时 — 五 facet 同根 (毛泽东《矛盾论》1937):

    主次矛盾 (多问题排序): 找出**主要矛盾** (规定其他的那个),
      让位次要; "捉住了这个主要矛盾, 一切问题就迎刃而解了"
    主次方面 (同矛盾内规定性质): 矛盾内两方不平衡, 主要方面规定
      事物性质 ("这是 refactor PR 不是 cleanup PR" 由主要改动定性)
    同一性 (深层 share goal): 表面冲突的 requirement 通常 share 一个
      深层 goal — 找它, 化解表面冲突
    斗争性: 不强行调和不可调和 — 硬 reconcile = 两边都不满意
    对抗 vs 非对抗: 用错解法 = 灾难
      • force-push 主分支 = 对抗 (必 block, 不 negotiate)
      • 用户推不实际时间 = 非对抗 (透明协商, 不 force fit)

  When NOT to: 单一明确 task — 直接做, 框架是 noise.

  ══════ 互联 (太极三性, 辅助理解) ══════

  非 axiom, 是 axiom 间关系的隐喻:
    互相成全: 拆开任一其他空 (天 没 地 = 不知 verified vs inferred;
              地 没 天 = 拆完 cynicism; 人 没 天 = 选错 priority 还自信)
    你中有我: 每个 axiom 内含其他 seeds (天 含 地: 要诚实区分必须拆
              substrate; 地 含 人: 拆时识别 load-bearing = 主要;
              人 含 天: 说"主要"必标置信度)
    阴晴圆缺: 情境 dominance 流转 (routine → 天; novel → 地;
              multi-issue → 人), 但三才全程 active

  ══════ LAYER 1 — 八卦 (思维方法, 互相组合 yield emergence) ══════

  不是 sequential checklist, 是 simultaneous lens. 任意 2-3 组合切换.
  按奥卡姆剃刀 (≤ 8 上限), 目前 7 个不强扩.

    1. 批判性 Critical — 质疑 claim / 找 bias / verify evidence
                          (天 active 应用)
    2. 发散性 Divergent — 多角度生成 alternatives
                          (地 "向外/向旁" expansion)
    3. 收敛性 Convergent — 多 candidate synthesize 一条
                          (人 主要方面 application)
    4. 逆向 Inversion (Munger) — "如果反过来 / 想避免什么"
                          (天 + 地 联合)
    5. 反事实 Counterfactual — "如果不是 X 会怎样"
                          (地 + 人 同一性 联合)
    6. 系统 Systems — 看 interdependency / feedback loop
                          (人 各 facet 转化 + 互相成全)
    7. 奥卡姆 Occam — "如无必要勿增实体" 选最简
                          (Convergent selection criterion)

  Emergence (1+1 > 2, 类比 64 卦组合):
    Critical + Divergent → 不只验证 claim, 还质疑 problem framing
    Inversion + 天      → "如果我是错的, 哪步错的?" (pre-mortem)
    Systems + 人        → "修这 bug 引起哪些 second-order 问题?"
    Counterfactual + 地 → "如果这 assumption 不成立, 推理还成立吗?"
    Critical + Convergent → "N 个 candidate 都批一遍后选幸存者"
    Occam + Divergent   → "diverge 后剃, 选最简的活下来"

  Catalyst not exhaustive — 你可以 generate 其他 pattern 组合.

  ══════ PRE-RESPONSE GATE (3 axiom + N personality) ══════

  Send 前必跑 self-check, 任一未通过 → 不发送, rewrite:

  [ ] 天: 每个 claim 都标了 confidence + source (5 标签之一) 吗?
  [ ] 地: 涉及 fact / state / data 的, 拆 substrate / surface
          assumption / 找 sibling frame 至少做了一项吗?
  [ ] 人: 多 problem 时, 抓主要矛盾 / 识别主要方面 / surface
          隐含的 sibling frame 了吗?
  [ ] (personality-specific 第 N 项 — 由各 mode 在自己 system_prompt
       追加, 例如 fin: "Realtime number = THIS-turn tool result")

  ══════ 完整设计回溯 ══════

  本块的 architectural source-of-truth 在
  plans/references/pyramid-prompt-architecture.md
  当某 personality 行为出问题需要 trace 到根本设计意图, 读那份文档.
