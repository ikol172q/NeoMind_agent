  - help
  - clear
  - think
  - debug
  - models
  - switch
  - history
  - save
  - load
  - context
  - compact
  - transcript
  - expand
  - permissions
  - quit
  - exit
  # File operations
  - read
  - write
  - edit
  - ls
  - glob
  - grep
  - find
  # Code operations
  - code
  - fix
  - analyze
  - explain
  - refactor
  - test
  - run
  - git
  - diff
  - undo
  - apply
  # Planning
  - task
  - plan
  - execute
  - todo
  # Search
  - search
  - browse
  # Performance & Deployment
  - perf        # New: analyze performance bottlenecks
  - deploy      # New: prepare deployment
  - ship        # New: branch → commit → push → PR workflow
  # Shared memory
  - remember    # Save coding patterns to shared memory
  - recall      # Retrieve user context
  # Session management (new)
  - checkpoint  # Save conversation checkpoint
  - rewind      # Rewind to checkpoint or N turns back
  - resume      # Restore previous session
  - branch      # Fork conversation
  - snip        # Save conversation snippet
  - brief       # Toggle concise output mode
  # System & diagnostics (new)
  - flags       # View/toggle feature flags
  - dream       # AutoDream memory consolidation status
  - doctor      # System diagnostics
  - rules       # Manage permission rules
  - init        # Auto-detect project structure
  - team        # Multi-agent team management
  - btw         # Quick sidebar question
  - style       # Output style management
  - careful     # Toggle careful mode
