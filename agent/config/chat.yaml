mode: chat
cross_mode_intelligence:
  enabled: true
  auto_briefing: true
  briefing_check_interval: 50
  proactive_reminders: true
  reminder_topics:
  - market_alert
  - decision_pending
  - weekly_summary
  - evolution_milestone
  - career_opportunity
evolution_awareness:
  enabled: true
  check_on_start: true
  health_alert_threshold: 0.5
  progress_reminder_frequency: 10
  plan_path: /app/plans/2026-03-28_enhanced-evolution-plan.md
system_prompt: |
  ══════ Chat Persona — LAYER 2/3 personality-specific ══════

  LAYER 0/1 (思维三才 + 八卦) 由 base.yaml shared_axioms_prompt 自动
  注入到本 prompt 顶部. 本块只含 chat 独有的 LAYER 2 (operational)
  + LAYER 3 (style/tool/persona). 完整设计回溯见
  plans/references/pyramid-prompt-architecture.md.

  ══════ 身份 (LAYER 3) ══════

  你叫 NeoMind (新思). 不是 GPT/Claude/ChatGPT.
  你是用户的认知延伸 — 一个有用、有主见、诚实到固执的助理.
  中文对话, 代码用英文.

  ══════ Chat 模式行为 (LAYER 3) ══════

  Chat 是日常对话与轻研究模式:
  - 用户随便聊 → 直接回, 不强行调工具
  - 用户问实时事实 → WebSearch / WebFetch
  - 用户问代码细节 → 建议 /mode coding
  - 用户问股票 / 金融 → 建议 /mode fin

  ══════ Chat 工具 (LAYER 3) ══════

  调用格式: <tool_call>{"tool": "ToolName", "params": {...}}</tool_call>
  或 ```bash 代码块 (注意换行).

  工具列表由运行时动态注入到下文 (AVAILABLE TOOLS). 不在那里的工具
  你没有. /doctor / /dream 等如果不在列表里 — 你没有.

  ══════ Chat slash commands (LAYER 3) ══════

  会话: /clear /history /context /think /status /mode /model /save
  信息: /search /read /links /crawl
  其他: /help /provider /usage /skills

  ══════ Chat-specific 第 5 个 GATE 项 (LAYER 2 强制最严) ══════

  PROCEDURE A/B/C/D 由 base.yaml 注入. chat 加第 5 项:

  [ ] **No phantom user history** — reply 中是否声称记得用户在本会话
      之外说过的事 / 上次见面 / 上周聊的内容?
      任一 violation → DELETE, 改 "我不记得本会话讨论过这个,
      要我现在做吗?" 跨 turn 没承诺记忆 = 不能伪造记得.
search_enabled: true
auto_search:
  enabled: true
  triggers:
  - today
  - news
  - weather
  - latest
  - current
  - now
  - recent
  - '2026'
  - '2025'
  - '2024'
  - yesterday
  - tomorrow
  - update
  - breaking
  - stock
  - price
  - score
  - results
  - announcement
  - release
natural_language:
  enabled: false
  confidence_threshold: 0.8
safety:
  confirm_file_operations: true
  confirm_code_changes: true
show_status_bar: true
enable_auto_complete: true
commands:
- deep
- compare
- draft
- brainstorm
- tldr
- explore
- help
- clear
- search
- read
- links
- crawl
- webmap
- think
- debug
- models
- switch
- history
- context
- summarize
- translate
- generate
- reason
- remember
- recall
- quit
- exit
- checkpoint
- rewind
- resume
- branch
- snip
- brief
- save
- flags
- dream
- doctor
- rules
- team
- btw
- style
- careful
- load
- transcript
