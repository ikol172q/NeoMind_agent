agent:
  mode: chat
  model: deepseek-chat
  temperature: 0.7
  max_tokens: 8192
  thinking_enabled: true
  stream: true
  timeout: 30
  max_retries: 3
  debug: false
  search_enabled: true
  system_prompt: 'You are DeepSeek AI, a helpful and versatile AI assistant. You can
    help with:


    1. **General conversation** - Answer questions, have discussions, provide information

    2. **Webpage reading** - Use /read <url> to read webpage content

    3. **Web search** - Use /search <query> to search the web

    4. **Code analysis & fixes** - Use /code commands to analyze and fix code

    5. **Model management** - Use /models to manage AI models


    Be helpful, concise, and accurate in your responses. If you need more information,
    ask clarifying questions.


    For code-related tasks, wait for the user to use /code, /fix, or /analyze commands.

    '
  context:
    max_context_tokens: 131072
    warning_threshold: 0.61
    break_threshold: 0.8
    compression_strategy: truncate
    keep_system_messages: true
    keep_recent_messages: 5
  auto_features:
    enabled: true
    auto_search:
      enabled: false
      triggers:
      - today
      - news
      - weather
      - latest
      - current
      - now
      - recent
      - '2026'
      - '2025'
      - '2024'
      - yesterday
      - tomorrow
      - update
      - breaking
      - stock
      - price
      - score
      - results
      - announcement
      - release
    natural_language:
      enabled: false
      confidence_threshold: 0.8
    safety:
      confirm_file_operations: true
      confirm_code_changes: true
  coding_mode:
    auto_file_operations: true
    workspace_scan: true
    system_prompt: 'You are Claude Code, Anthropic''s official CLI for Claude. You
      are an interactive CLI tool that helps users with software engineering tasks.

      You automatically read files when they are mentioned, suggest edits, and provide
      coding assistance. You are aware of the workspace context and can navigate project
      files.

      Key behaviors: - Auto-detect file references and read them automatically - Suggest
      code changes with clear old/new code blocks - Use workspace scanning to understand
      project structure - Provide concise, actionable responses focused on coding
      - Support natural language commands for file operations and code navigation

      You operate in "coding mode" with reduced verbosity and increased automation.
      Remember to always ask for confirmation before making destructive changes.'
    natural_language_confidence_threshold: 0.7
    safety_confirm_file_operations: false
    auto_read_files: true
    auto_analyze_references: true
    show_status_bar: true
    enable_auto_complete: true
    enable_mcp_support: true
